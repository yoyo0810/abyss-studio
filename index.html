function optText(o){return (o&&typeof o==='object')?(o.text||''):String(o||'');}
function optTo(o){return (o&&typeof o==='object')?(o.to||''):'';}
function shortBlockLabel(bl){const cut=(t,n)=>{t=String(t==null?'':t).replace(/\n/g,' ').trim();return t.length>(n||16)?t.slice(0,n||16)+'…':t;};const tt=BLOCK_TYPES.find(t=>t.t===bl.type)||{ic:''};if(bl.type==='line'){const w=(bl.windows||[])[0];return tt.ic+' '+cut(w?w.text:'',16);}if(bl.type==='choice')return tt.ic+' '+cut(optText((bl.opts||[])[0]),16);if(bl.type==='setting')return '📍 '+cut((bl.place||'場面'),16);if(bl.type==='cg')return tt.ic+' '+cut(bl.title,16);return tt.ic+' '+cut(bl.text,16);}
function computeSceneAddrs(s,phaseCode,settingOffset,sceneNo){
  /* 塊（チャンク）ベースのナンバリング：分岐(フォーク)と合流を境界に、
     その間の連続ブロックを1つの塊にまとめ、塊にだけ番号を振る。
     メモ(note)は塊に含めず番号も振らない。ルートは親フォーク番号＋レター。 */
  const arr=s.blocks||[]; const addrById={}; const ordered=[];
  const byId={}; arr.forEach(b=>{byId[b.id]=b;});
  const seg=phaseCode?(phaseCode+'-'+(sceneNo||1)):null;
  const edges=[]; const optInfo={};
  arr.forEach(bl=>{
    if(bl.type==='choice'){ (bl.opts||[]).forEach((o,oi)=>{ const to=optTo(o); if(to){ edges.push({from:bl.id,to:to}); if(!optInfo[to])optInfo[to]={forkId:bl.id,letter:String.fromCharCode(97+oi),text:optText(o)}; } }); }
    if(bl.to)edges.push({from:bl.id,to:bl.to});
  });
  const incoming={}; edges.forEach(e=>{ incoming[e.to]=(incoming[e.to]||0)+1; });
  const mergeById={}; Object.keys(incoming).forEach(k=>{ if(incoming[k]>=2)mergeById[k]=incoming[k]; });
  const nonNote=arr.filter(b=>b.type!=='note');
  const headSet=new Set(); if(nonNote[0])headSet.add(nonNote[0].id);
  arr.forEach(bl=>{ if(bl.type==='note')return; if(bl.type==='choice')headSet.add(bl.id); if((incoming[bl.id]||0)>=2)headSet.add(bl.id); if(optInfo[bl.id])headSet.add(bl.id); });
  const chunks=[]; let cur=null;
  arr.forEach(bl=>{ if(bl.type==='note')return; if(headSet.has(bl.id)||!cur){ cur={headId:bl.id,members:[bl.id]}; chunks.push(cur); } else cur.members.push(bl.id); });
  const chunkByHead={}; chunks.forEach(c=>chunkByHead[c.headId]=c);
  chunks.forEach(c=>{ const h=c.headId; c.isMerge=(incoming[h]||0)>=2; c.isFork=!!(byId[h]&&byId[h].type==='choice'); c.isRoute=(!c.isMerge && !!optInfo[h]); if(c.isRoute)c.route=optInfo[h]; c.mergeCount=incoming[h]||0; });
  let mainNo=0;
  chunks.forEach(c=>{ if(!c.isRoute){ mainNo++; c.num=mainNo; c.addr=seg?(seg+'.'+mainNo):('・'+mainNo); } });

  arr.forEach(bl=>{ if(bl.type==='note')addrById[bl.id]=''; });
  arr.forEach(bl=>{ ordered.push({id:bl.id,addr:(bl.type==='note'?'—':(addrById[bl.id]||'')),label:shortBlockLabel(bl),setting:bl.type==='setting'}); });
  return {addrById:addrById, mergeById:mergeById, incomingById:{}, ordered:ordered, chunks:chunks, chunkByHead:chunkByHead, chunkOfId:chunkOfId, byId:byId};
}
function linkTargetOptions(fl,excludeId,curTo){

function chunkHeaderHtml(ck){

  else if(ck.isFork){ extra='<span class="ch-fork">❓ 分岐</span>'; }

function buildScript(s,E,phctx){
  phctx=phctx||{};
  const arr=s.blocks||[]; if(!arr.length)return '';
  const flow=computeSceneAddrs(s,phctx.phaseCode,phctx.settingOffset,phctx.sceneNo);
  const chunkOf=flow.chunkOfId||{};

  arr.forEach((bl,i)=>{

    const ck=chunkOf[bl.id];
    if(ck && ck.headId===bl.id){

      const ml=ck.depth>0?('margin-left:'+(ck.depth*16)+'px;'):'';

/* ---------- システム & バランス ---------- */
function ensureTimelines(E){
  if(!E.timelines||typeof E.timelines!=='object')E.timelines={past:[],inc:[],post:[]};
  ['past','inc','post'].forEach(ph=>{
    let v=E.timelines[ph];
    if(typeof v==='string')v=v.trim()?[{id:uid(),time:'',event:v.trim()}]:[];
    else if(!Array.isArray(v))v=[];
    v.forEach(r=>{r.id=r.id||uid();r.time=r.time||'';r.event=r.event||'';});
    E.timelines[ph]=v;
  });
}
function tlPhase(ph,rows){
  rows=Array.isArray(rows)?rows:[];
  const items=rows.map(r=>`<div class="tl-ev">
    <input class="tl-time" type="text" data-scope="tlrow" data-phase="${ph}" data-id="${r.id}" data-field="time" value="${esc(r.time||'')}" placeholder="時刻">
    <textarea class="tl-evtext" data-scope="tlrow" data-phase="${ph}" data-id="${r.id}" data-field="event" placeholder="出来事">${esc(r.event||'')}</textarea>
    <span class="ic-mini danger" data-act="deltlrow" data-phase="${ph}" data-id="${r.id}">${ICONS.trash}</span>
  </div>`).join('');
  return `<div class="tl-events">${items||'<div class="tl-empty">出来事が未登録です。下のボタンから追加してください。</div>'}</div>
    <button class="btn sm ghost" data-act="addtlrow" data-phase="${ph}">${ICONS.plus} 出来事を追加</button>`;
}
function cardGrantIndex(E){
  const idx={};
  (E.scenes||[]).forEach((s,si)=>{
    const lbl='S'+String(si+1).padStart(2,'0')+'・'+(s.title||'(無題)');
    (s.blocks||[]).forEach(b=>{(b.grants||[]).forEach(cid=>{const a=idx[cid]=idx[cid]||[];if(a.indexOf(lbl)<0)a.push(lbl);});});
  });
  return idx;
}

function consistency(){
  const E=ep();const out=[];
  const emptyBeats=E.beats.filter(b=>!b.scenario||!b.scenario.trim());
  if(emptyBeats.length)out.push(['warn','シナリオ未記入のビートがあります',`${emptyBeats.length}件：${emptyBeats.map(b=>b.ja).join('、')}`]);
  else out.push(['ok','全15ビートにシナリオ記入済み','構成の骨格は埋まっています']);
  const emptyScenes=E.scenes.filter(s=>s.blocks.length===0);
  if(emptyScenes.length)out.push(['warn','空のシーンがあります',emptyScenes.map(s=>s.title).join('、')]);
  const sceneBeatKeys=new Set(E.scenes.map(s=>s.beatKey).filter(Boolean));
  const beatsNoScene=E.beats.filter(b=>!sceneBeatKeys.has(b.key));
  if(beatsNoScene.length)out.push(['warn','対応シーンの無いビート',`${beatsNoScene.length}件：${beatsNoScene.map(b=>b.ja).join('、')}（シーンタブで作成すると構成と連動します）`]);
  else out.push(['ok','全ビートに対応シーンあり','構成とシーンが連動しています']);
  const scenesNoBeat=E.scenes.filter(s=>!s.beatKey);
  if(scenesNoBeat.length)out.push(['warn','ビート未設定のシーン',`${scenesNoBeat.map(s=>s.title).join('、')}（紐づくビートを設定してください）`]);
  const producedHyp=new Set(E.recipes.map(r=>r.outId).filter(Boolean));
  const orphanHyp=E.cards.filter(c=>c.type==='仮説'&&!producedHyp.has(c.id));
  if(orphanHyp.length)out.push(['warn','入手経路のない仮説カード',`${orphanHyp.map(c=>c.name).join('、')}（合成レシピの出力に設定されていません）`]);
  else if(E.cards.some(c=>c.type==='仮説'))out.push(['ok','全仮説カードに合成経路あり','ロジックツリーが繋がっています']);
  const _gi=cardGrantIndex(E);
  const unplaced=E.cards.filter(c=>!_gi[c.id]&&!producedHyp.has(c.id));
  if(unplaced.length)out.push(['warn','台本に未配置のカードがあります',`${unplaced.length}枚：${unplaced.map(c=>c.name).join('、')}（シーンの該当ブロックを開き「🎴獲得カード」に設定してください）`]);
  else if(E.cards.length)out.push(['ok','全カードが台本に配置済み','獲得経路（または合成生成）の穴はありません']);
  const ids=new Set(E.cards.map(c=>c.id));
  const broken=E.recipes.filter(r=>!ids.has(r.aId)||!ids.has(r.bId)||(r.outId&&!ids.has(r.outId))||!r.outId);
  if(broken.length)out.push(['warn','未完成の合成レシピ',`${broken.length}件：入力／出力カードが未設定または削除済みです`]);
  if(E.recipes.length>=2)out.push(['ok','多段の論理階段が存在','仮説を入力にした合成で「芋づる式」を表現できています']);
  else if(E.cards.length)out.push(['warn','論理の階段が浅い','合成レシピを増やすと本格ミステリの歯ごたえが増します']);
  const roles=new Set(castOf(E).map(c=>c.role));
  const need=['探偵','助手','被害者の魂'];const miss=need.filter(r=>!roles.has(r));
  if(miss.length)out.push(['warn','三位一体のキャストが不足',`未設定の役割：${miss.join('、')}（共通＋固有の合算で判定）`]);
  else out.push(['ok','探偵・助手・被害者の三位一体が揃っている','捜査エンジンの役割分担OK']);
  return out.map(([k,t,d])=>`<div class="check ${k}"><span class="ico">${k==='ok'?'✓':'!'}</span><div><div class="ct">${esc(t)}</div><div class="cd">${esc(d)}</div></div></div>`).join('');
}

function doInlineDelete(btn){
  const scope=btn.dataset.scope,id=btn.dataset.id;
  const wrap=document.createElement('span');wrap.className='del-confirm';
  wrap.innerHTML='削除しますか？ <button class="btn sm danger" id="dY">削除</button> <button class="btn sm ghost" id="dN">取消</button>';
  btn.replaceWith(wrap);
  wrap.querySelector('#dY').onclick=()=>performDelete(scope,id);
  wrap.querySelector('#dN').onclick=()=>{pendingDelete=null;render();};
}
function performDelete(scope,id){
  const E=ep();
  if(scope==='episode'){
    if(state.episodes.length<=1){pendingDelete=null;render();return;}
    state.episodes=state.episodes.filter(e=>e.id!==id);
    if(state.activeEp===id)state.activeEp=state.episodes[0].id;
  }
  else if(scope==='world')state.world=state.world.filter(w=>w.id!==id);
  else if(scope==='arc')state.bridge.arcs=state.bridge.arcs.filter(a=>a.id!==id);
  else if(scope==='scast')state.seriesCast=state.seriesCast.filter(c=>c.id!==id);
  else if(scope==='char')E.cast=E.cast.filter(c=>c.id!==id);
  else if(scope==='scene'){E.scenes=E.scenes.filter(s=>s.id!==id);if(currentScene===id)currentScene=null;}
  else if(scope==='card')E.cards=E.cards.filter(c=>c.id!==id);
  else if(scope==='recipe')E.recipes=E.recipes.filter(r=>r.id!==id);
  pendingDelete=null;scheduleSave();render();
}

function applyInput(t){
  const sc=t.dataset.scope,f=t.dataset.field;
  let val=t.type==='checkbox'?t.checked:t.value;
  if(t.type==='range')val=clamp(t.value);
  const E=ep();
  if(sc==='meta')state.meta[f]=val;
  else if(sc==='bridge')state.bridge[f]=val;
  else if(sc==='arc'){const x=state.bridge.arcs.find(y=>y.id===t.dataset.id);if(x)x[f]=val;}
  else if(sc==='world'){const w=state.world.find(x=>x.id===t.dataset.id);if(w)w[f]=val;}
  else if(sc==='episode'){const e0=state.episodes.find(x=>x.id===t.dataset.id);if(e0)e0[f]=val;}
  else if(sc==='scast'){const c=state.seriesCast.find(x=>x.id===t.dataset.id);if(c)c[f]=val;}
  else if(sc==='char'){const c=E.cast.find(x=>x.id===t.dataset.id);if(c)c[f]=val;}
  else if(sc==='beat'){const b=E.beats.find(x=>x.id===t.dataset.id);if(b)b[f]=val;}

  else if(sc==='card'){const c=E.cards.find(x=>x.id===t.dataset.id);if(c)c[f]=val;}

  s.blocks.forEach(bl=>{
    if(bl.type==='dir')md+='（'+bl.text+'）\n\n';
    else if(bl.type==='note')md+='<!-- メモ: '+bl.text+' -->\n\n';
    else if(bl.type==='line'){(bl.windows||[]).forEach(w=>{md+='【'+nameOf(w.charId)+'】'+w.text+'\n\n';});}

async function tryShareSave(){
  const json=JSON.stringify(state,null,2), fname=_projFilename(), msg=document.getElementById('saveMsg');
  try{
    if(typeof navigator!=='undefined' && navigator.share){
      const file=(typeof File!=='undefined')?new File([json],fname,{type:'application/json'}):null;
      if(file && navigator.canShare && navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:fname}); DIRTY=false;updateSaveUI();
        if(msg)msg.textContent='共有シートで「\u201Cファイル\u201Dに保存」を選べば保存完了です。';
        return;
      }
      // ファイル共有不可でも、テキスト共有を試す
      await navigator.share({title:fname,text:json});
      if(msg)msg.textContent='共有しました（テキスト）。メモ等に保存してください。';
      return;
    }
    if(msg)msg.textContent='この環境は共有に対応していません。「①全文をコピー」を使ってください。';
  }catch(e){ if(e&&e.name==='AbortError'){if(msg)msg.textContent='共有をキャンセルしました。';return;} if(msg)msg.textContent='共有を開けませんでした。「①全文をコピー」を使ってください。'; }

// AI差分パッチ：プロジェクト全文ではなく「変更点」だけを当てる。ID(シーン/ブロック/窓)は自動補完。
function applyPatch(text){
  let pk; try{pk=JSON.parse(text);}catch(e){return {ok:false,report:'JSONとして読めませんでした。'};}
  const ops=pk&&(pk.ops||pk.operations);
  if(!ops||!Array.isArray(ops)||!(pk.abyssPatch||pk.patch==='abyss'))
    return {ok:false,report:'パッチ形式ではありません（abyssPatch / ops が必要）。'};
  const log=[]; let done=0; const touchedEps=new Set();
  snapshot('差分適用前');
  ops.forEach((o,i)=>{
    const tag='['+(i+1)+'] '+(o.op||'?');
    try{
      if(o.op==='replaceScene'){
        const ep=_findEp(o.epId); if(!ep)throw new Error('episode '+o.epId+' なし');
        const idx=ep.scenes.findIndex(x=>x.id===o.sceneId); if(idx<0)throw new Error('scene '+o.sceneId+' なし');
        const sc=_assignIdsScene(o.scene||{}); sc.id=o.sceneId;
        ep.scenes[idx]=sc; touchedEps.add(ep); log.push(tag+' OK：シーン置換「'+(sc.title||'').slice(0,16)+'」'); done++;
      }else if(o.op==='replaceSceneBlocks'){
        const ep=_findEp(o.epId); if(!ep)throw new Error('episode '+o.epId+' なし');
        const sc=ep.scenes.find(x=>x.id===o.sceneId); if(!sc)throw new Error('scene '+o.sceneId+' なし');
        sc.blocks=(o.blocks||[]); _assignIdsScene(sc); touchedEps.add(ep); log.push(tag+' OK：本文'+sc.blocks.length+'ブロック差替'); done++;
      }else if(o.op==='insertScene'){
        const ep=_findEp(o.epId); if(!ep)throw new Error('episode '+o.epId+' なし');
        const sc=_assignIdsScene(o.scene||{});
        let at=ep.scenes.length;
        if(o.afterSceneId){const k=ep.scenes.findIndex(x=>x.id===o.afterSceneId); if(k<0)throw new Error('after '+o.afterSceneId+' なし'); at=k+1;}
        else if(o.beforeSceneId){const k=ep.scenes.findIndex(x=>x.id===o.beforeSceneId); if(k<0)throw new Error('before '+o.beforeSceneId+' なし'); at=k;}
        ep.scenes.splice(at,0,sc); touchedEps.add(ep); log.push(tag+' OK：シーン挿入「'+(sc.title||'').slice(0,16)+'」'); done++;
      }else if(o.op==='deleteScene'){
        const ep=_findEp(o.epId); if(!ep)throw new Error('episode '+o.epId+' なし');
        const k=ep.scenes.findIndex(x=>x.id===o.sceneId); if(k<0)throw new Error('scene '+o.sceneId+' なし');
        const t=ep.scenes[k].title||''; ep.scenes.splice(k,1); touchedEps.add(ep); log.push(tag+' OK：シーン削除「'+t.slice(0,16)+'」'); done++;
      }else if(o.op==='replaceBeat'){
        const ep=_findEp(o.epId); if(!ep)throw new Error('episode '+o.epId+' なし');
        const b=ep.beats.find(x=>x.key===o.beatKey); if(!b)throw new Error('beat '+o.beatKey+' なし');
        Object.assign(b,o.beat||{}); touchedEps.add(ep); log.push(tag+' OK：ビート更新 '+o.beatKey); done++;
      }else if(o.op==='setEpisodeField'){
        const ep=_findEp(o.epId); if(!ep)throw new Error('episode '+o.epId+' なし');
        const allow=['title','logline','bridgeNote','trick','logic','kind'];
        if(allow.indexOf(o.field)<0)throw new Error('field '+o.field+' は不可');
        ep[o.field]=o.value; touchedEps.add(ep); log.push(tag+' OK：'+o.field+' 更新'); done++;
      }else if(o.op==='replaceWorld'){
        state.world=state.world||[]; const k=state.world.findIndex(w=>w.id===o.wId);
        const ent=Object.assign({media:[]},o.entry||{}); ent.id=o.wId; ent.media=ent.media||[];
        if(k<0){state.world.push(ent); log.push(tag+' OK：世界観 追加 '+o.wId);} else {state.world[k]=ent; log.push(tag+' OK：世界観 置換 '+o.wId);} done++;
      }else if(o.op==='setWorldField'){
        const w=(state.world||[]).find(x=>x.id===o.wId); if(!w)throw new Error('world '+o.wId+' なし');
        w[o.field]=o.value; log.push(tag+' OK：世界観 '+o.wId+'.'+o.field); done++;
      }else if(o.op==='addWorld'){
        state.world=state.world||[]; const ent=Object.assign({id:uid(),media:[]},o.entry||{}); ent.media=ent.media||[];
        let at=state.world.length; if(o.afterId){const k=state.world.findIndex(w=>w.id===o.afterId); if(k>=0)at=k+1;}
        state.world.splice(at,0,ent); log.push(tag+' OK：世界観 挿入「'+(ent.title||'').slice(0,16)+'」'); done++;
      }else if(o.op==='setMetaField'){
        const allow=['title','tagline','logline']; if(allow.indexOf(o.field)<0)throw new Error('meta '+o.field+' は不可');
        state.meta[o.field]=o.value; log.push(tag+' OK：meta.'+o.field); done++;
      }else if(o.op==='setSceneField'){
        const ep=_findEp(o.epId); if(!ep)throw new Error('episode '+o.epId+' なし');
        const sc=ep.scenes.find(x=>x.id===o.sceneId); if(!sc)throw new Error('scene '+o.sceneId+' なし');
        const allow=['title','summary','beatKey','phase'];
        if(allow.indexOf(o.field)<0)throw new Error('scene field '+o.field+' は不可');
        sc[o.field]=o.value; touchedEps.add(ep); log.push(tag+' OK：scene.'+o.field+' 更新'); done++;
      }else if(o.op==='insertBlock'){
        const ep=_findEp(o.epId); if(!ep)throw new Error('episode '+o.epId+' なし');
        const sc=ep.scenes.find(x=>x.id===o.sceneId); if(!sc)throw new Error('scene '+o.sceneId+' なし');
        sc.blocks=sc.blocks||[];
        const blk=o.block||{}; if(!blk.id)blk.id=uid();
        let at=(typeof o.index==='number')?o.index:sc.blocks.length; if(at<0)at=0; if(at>sc.blocks.length)at=sc.blocks.length;
        sc.blocks.splice(at,0,blk); touchedEps.add(ep); log.push(tag+' OK：ブロック挿入 @'+at+'（'+(blk.type||'?')+'）'); done++;
      }else if(o.op==='setBlockTarget'){
        const ep=_findEp(o.epId); if(!ep)throw new Error('episode '+o.epId+' なし');
        const sc=ep.scenes.find(x=>x.id===o.sceneId); if(!sc)throw new Error('scene '+o.sceneId+' なし');
        const bl=(sc.blocks||[]).find(x=>x.id===o.blockId); if(!bl)throw new Error('block '+o.blockId+' なし');
        bl.to=o.to||''; touchedEps.add(ep); log.push(tag+' OK：ブロック遷移先 設定'); done++;
      }else if(o.op==='setOptionTarget'){
        const ep=_findEp(o.epId); if(!ep)throw new Error('episode '+o.epId+' なし');
        const sc=ep.scenes.find(x=>x.id===o.sceneId); if(!sc)throw new Error('scene '+o.sceneId+' なし');
        const bl=(sc.blocks||[]).find(x=>x.id===o.blockId); if(!bl)throw new Error('block '+o.blockId+' なし');
        if(bl.type!=='choice')throw new Error('block '+o.blockId+' は選択肢ではない');
        bl.opts=bl.opts||[]; const i=o.optIndex|0; if(i<0||i>=bl.opts.length)throw new Error('opt index '+i+' 範囲外');
        let oo=bl.opts[i]; if(!oo||typeof oo!=='object'){oo={text:String(oo||''),to:''}; bl.opts[i]=oo;}
        if(typeof o.text==='string')oo.text=o.text; oo.to=o.to||'';
        touchedEps.add(ep); log.push(tag+' OK：選択肢 '+i+' の遷移先設定'); done++;
      }else if(o.op==='setBlockGrants'){
        const ep=_findEp(o.epId); if(!ep)throw new Error('episode '+o.epId+' なし');
        const sc=ep.scenes.find(x=>x.id===o.sceneId); if(!sc)throw new Error('scene '+o.sceneId+' なし');
        const bl=(sc.blocks||[]).find(x=>x.id===o.blockId); if(!bl)throw new Error('block '+o.blockId+' なし');
        bl.grants=Array.isArray(o.cardIds)?o.cardIds.slice():[]; touchedEps.add(ep); log.push(tag+' OK：獲得カード設定 ('+bl.grants.length+')'); done++;
      }else if(o.op==='setBlockRequires'){
        const ep=_findEp(o.epId); if(!ep)throw new Error('episode '+o.epId+' なし');
        const sc=ep.scenes.find(x=>x.id===o.sceneId); if(!sc)throw new Error('scene '+o.sceneId+' なし');
        const bl=(sc.blocks||[]).find(x=>x.id===o.blockId); if(!bl)throw new Error('block '+o.blockId+' なし');
        bl.requires=Array.isArray(o.cardIds)?o.cardIds.slice():[]; touchedEps.add(ep); log.push(tag+' OK：所持条件設定 ('+bl.requires.length+')'); done++;
      }else if(o.op==='setOptionRequires'){
        const ep=_findEp(o.epId); if(!ep)throw new Error('episode '+o.epId+' なし');
        const sc=ep.scenes.find(x=>x.id===o.sceneId); if(!sc)throw new Error('scene '+o.sceneId+' なし');
        const bl=(sc.blocks||[]).find(x=>x.id===o.blockId); if(!bl)throw new Error('block '+o.blockId+' なし');
        if(bl.type!=='choice')throw new Error('block '+o.blockId+' は選択肢ではない');
        bl.opts=bl.opts||[]; const i=o.optIndex|0; if(i<0||i>=bl.opts.length)throw new Error('opt index '+i+' 範囲外');
        let oo=bl.opts[i]; if(!oo||typeof oo!=='object'){oo={text:String(oo||''),to:'',requires:[]}; bl.opts[i]=oo;}
        oo.requires=Array.isArray(o.cardIds)?o.cardIds.slice():[]; touchedEps.add(ep); log.push(tag+' OK：選択肢 '+i+' の所持条件設定'); done++;
      }else{ throw new Error('未知のop'); }
    }catch(e){ log.push(tag+' ✕ '+e.message); }
  });
  // 整形を再適用
  touchedEps.forEach(ep=>{ ensureTimelines(ep); (ep.cast||[]).forEach(c=>ensureCharShape(c)); (ep.scenes||[]).forEach(sc=>(sc.blocks||[]).forEach(b=>ensureBlockShape(b))); });
  state.world=state.world||[]; state.world.forEach(w=>w.media=w.media||[]);
  if(done>0){ scheduleSave(); }
  return {ok:done>0, done:done, total:ops.length, report:log.join('\n')};
}
function importFromText(txt){
  try{
    let obj=JSON.parse(txt);
    if(obj&&!obj.episodes&&obj.beats)obj=migrate(obj);
    if(!obj||!obj.episodes||!obj.meta)throw new Error('bad');
    state=obj;
    state.ui=state.ui||{theme:'dark'};
    state.bridge=state.bridge||{overview:'',arcs:[]};state.bridge.arcs=state.bridge.arcs||[];
    state.world=state.world||[];state.world.forEach(w=>w.media=w.media||[]);
    if(typeof state.designDoc!=='string')state.designDoc=DESIGN_DOC;
    if(typeof state.bridgePlot!=='string')state.bridgePlot=BRIDGE_PLOT;
    state.cloud=state.cloud||{};state.seriesCast=state.seriesCast||[];state.seriesCast.forEach(c=>ensureCharShape(c));
    state.episodes.forEach(e=>{if(e.deductionDoc===undefined)e.deductionDoc='';ensureTimelines(e);(e.cast||[]).forEach(c=>ensureCharShape(c));(e.scenes||[]).forEach(sc=>(sc.blocks||[]).forEach(b=>ensureBlockShape(b)));});
    if(!state.activeEp||!state.episodes.some(e=>e.id===state.activeEp))state.activeEp=state.episodes[0]&&state.episodes[0].id;
    openBeat=openChar=currentScene=null;route='series';
    scheduleSave();applyTheme();render();
    return true;
  }catch(e){return false;}
}
function doImportFile(file){
  if(!file)return;
  snapshot('ファイル読込前');
  const rd=new FileReader();
  rd.onload=()=>{const ok=importFromText(String(rd.result||''));if(!ok)alert('読み込めませんでした。エクスポートしたJSONファイルか確認してください。');};
  rd.onerror=()=>alert('ファイルの読み込みに失敗しました。');
  rd.readAsText(file);
}

  const ta=document.getElementById('importTA');if(!ta||!ta.value.trim())return;

    state=obj;

    state.seriesCast=state.seriesCast||[];state.seriesCast.forEach(c=>ensureCharShape(c));
    state.episodes.forEach(e=>{e.scenes=e.scenes||[];e.cast=e.cast||[];e.cards=e.cards||[];e.recipes=e.recipes||[];e.timelines=e.timelines||{past:'',inc:'',post:''};e.balance=e.balance||blankBalance();if(e.deductionDoc===undefined)e.deductionDoc='';ensureTimelines(e);if(e.trick===undefined)e.trick='';if(e.logic===undefined)e.logic='';e.cast.forEach(c=>ensureCharShape(c));e.scenes.forEach(s=>{s.blocks=s.blocks||[];s.blocks.forEach(b=>ensureBlockShape(b));});});
    if(!state.activeEp||!state.episodes.find(e=>e.id===state.activeEp))state.activeEp=state.episodes[0].id;
    openBeat=openChar=currentScene=null;route='series';scheduleSave();render();
  }catch(err){ta.style.borderColor='var(--crimson)';ta.value='// 読み込みエラー：JSONの形式を確認してください\n'+ta.value;}
}

/* ============================ 起動 ============================ */
(async function init(){
  let saved=await loadProject();
  if(saved&&!saved.episodes&&saved.beats)saved=migrate(saved);
  BOOT_FOUND=!!saved; try{BOOT_PREV_AT=saved&&saved.meta&&saved.meta.updatedAt||null;}catch(e){}
  state=saved||seed();
  state.meta=state.meta||{title:'無題',tagline:'',logline:'',updatedAt:Date.now()};
  state.ui=state.ui||{theme:'dark'};if(!state.ui.theme)state.ui.theme='dark';
  state.bridge=state.bridge||{overview:'',arcs:[]};state.bridge.arcs=state.bridge.arcs||[];
  state.world=state.world||[];state.world.forEach(w=>w.media=w.media||[]);if(typeof state.designDoc!=='string')state.designDoc=DESIGN_DOC;if(typeof state.bridgePlot!=='string')state.bridgePlot=BRIDGE_PLOT;
  state.cloud=state.cloud||{};
  await ghLoadTokenAsync();
  state.seriesCast=state.seriesCast||[];state.seriesCast.forEach(c=>ensureCharShape(c));
  if(!state.episodes||!state.episodes.length)state.episodes=seed().episodes;
  if(!state.ep0Injected&&!state.episodes.some(e=>e.id==='ep0_train')){state.episodes.unshift(trainEpisode());state.activeEp='ep0_train';scheduleSave();}
  state.ep0Injected=true;
  if(state.tutDocVer!==TUT_DOC_VER){
    if(!(state.tutDocVer>=14)){
      state.episodes=state.episodes.filter(e=>e.id!=='ep0_tutorial'&&['無念の訪問','砕けた花瓶の真実','反証の刃','灯を渡すか'].indexOf(e.title)<0);
      canonStarters().forEach(se=>{if(!state.episodes.some(e=>e.id===se.id))state.episodes.push(se);});
    }
    if(!(state.tutDocVer>=19)){state.episodes=state.episodes.filter(e=>e.id!=='ep1_train');}
    // ver31 一度きり：修正版EP0/EP0.5（停電ミッドポイント＝方式X）を反映するため、既存のEP0/EP0.5をコード版へ差し替える。
    if(!(state.tutDocVer>=31)){
      state.episodes=state.episodes.filter(e=>e.id!=='ep0_train'&&e.id!=='ep0_office');
      state.episodes.unshift(officeEpisode());
      state.episodes.unshift(trainEpisode());
      state.activeEp='ep0_train';
    }
    // ver31以降：EP0/EP0.5を強制再生成しない（手編集・差分パッチが恒久反映）。未存在時のみ初期生成する。
    if(!state.episodes.some(e=>e.id==='ep0_office')) state.episodes.unshift(officeEpisode());
    if(!state.episodes.some(e=>e.id==='ep0_train')) state.episodes.unshift(trainEpisode());
    if(!(state.tutDocVer>=19)){state.activeEp='ep0_train';}
    [['sc_rei',REI_DEF],['sc_sub',SUB_DEF],['sc_chief',CHIEF_DEF],['sc_earl',EARL_DEF],['sc_toto',TOTO_DEF],['sc_coco',COCO_DEF],['sc_vet',VET_DEF],['sc_noel',NOEL_DEF],['sc_nicola',NICOLA_DEF]].forEach(([id,def])=>{const c=state.seriesCast.find(x=>x.id===id);if(c)Object.assign(c,def);else state.seriesCast.push({id,...def,media:[]});});
    if(!(state.tutDocVer>=13)){state.bridgePlot=BRIDGE_PLOT;state.bridge.overview=BRIDGE_OVERVIEW;state.bridge.arcs=BRIDGE_ARCS.map(a=>({...a}));}
    if(!(state.tutDocVer>=21)){state.world=WORLD_ENTRIES.map(w=>({...w,media:[]}));}
    if(!(state.tutDocVer>=40)){const _t=state.episodes.find(e=>e.id==='ep0_train');if(_t&&!_t.deductionDoc)_t.deductionDoc=EP0_DEDUCTION_DOC;}
    state.tutDocVer=TUT_DOC_VER;scheduleSave();
  }
  state.episodes.forEach(e=>{
    e.beats=e.beats&&e.beats.length?e.beats:blankBeats();
    if(e.deductionDoc===undefined)e.deductionDoc='';
    e.scenes=e.scenes||[];e.cast=e.cast||[];e.cards=e.cards||[];e.recipes=e.recipes||[];
    e.timelines=e.timelines||{past:'',inc:'',post:''};e.balance=e.balance||blankBalance();
    ensureTimelines(e);
    e.cast.forEach(c=>ensureCharShape(c));
    if(e.trick===undefined)e.trick=(e.id==='ep0_train'?TUT_TRICK:'');
    if(e.logic===undefined)e.logic=(e.id==='ep0_train'?TUT_LOGIC:'');
    e.scenes.forEach(s=>{s.blocks=s.blocks||[];s.blocks.forEach(b=>ensureBlockShape(b));});
  });
  if(!state.activeEp||!state.episodes.find(e=>e.id===state.activeEp))state.activeEp=state.episodes[0].id;
  applyTheme();
  render();
  DIRTY=false; updateSaveUI();
})();
